name: yii2-notes

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    init: true
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-app.ini:ro
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-notes}
      DB_USERNAME: ${DB_USERNAME:-notes}
      DB_PASSWORD: ${DB_PASSWORD:-notes}
      CACHE_HOST: memcached
      CACHE_PORT: 11211
      CACHE_DRIVER: ${CACHE_DRIVER:-memcached}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_TEST_BASE_URL: http://nginx
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-before-production-2026}
      COOKIE_VALIDATION_KEY: ${COOKIE_VALIDATION_KEY:-local-development-cookie-key-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      memcached:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8082}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-notes}
      POSTGRES_USER: ${DB_USERNAME:-notes}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notes}
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./docker/redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  memcached:
    image: memcached:1.6-alpine
    command: ["memcached", "-m", "128", "-I", "2m"]
    healthcheck:
      test: ["CMD-SHELL", "printf 'version\r\n' | nc 127.0.0.1 11211 | grep -q VERSION"]
      interval: 5s
      timeout: 3s
      retries: 10
