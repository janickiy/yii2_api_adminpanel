map "$request_method:$uri" $auth_limit_key {
    default "";
    ~^POST:(?:/index\.php)?/(?:api/v1/(?:login|register)|login)/*$ $binary_remote_addr;
}

map "$request_method:$uri" $feedback_limit_key {
    default "";
    ~^POST:(?:/index\.php)?/*$ $binary_remote_addr;
}

limit_req_zone $auth_limit_key zone=public_auth:10m rate=10r/m;
limit_req_zone $feedback_limit_key zone=public_feedback:10m rate=5r/m;

server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    root /var/www/html/frontend/web;
    client_max_body_size 16m;
    limit_req_status 429;
    limit_req zone=public_auth burst=10 nodelay;
    limit_req zone=public_feedback burst=5 nodelay;

    resolver 127.0.0.11 valid=30s;

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = / {
        try_files $uri /index.php?$query_string;
    }

    location = /api/v1/register {
        try_files $uri /index.php?$query_string;
    }

    location = /api/v1/register/ {
        try_files $uri /index.php?$query_string;
    }

    location = /api/v1/login {
        try_files $uri /index.php?$query_string;
    }

    location = /api/v1/login/ {
        try_files $uri /index.php?$query_string;
    }

    location = /login {
        try_files $uri @backend;
    }

    location = /logout {
        try_files $uri @backend;
    }

    location = /cp {
        try_files $uri @backend;
    }

    location ^~ /cp/ {
        try_files $uri @backend;
    }

    location ^~ /swagger-ui/ {
        root /var/www/html/frontend/web;
        try_files $uri =404;
        expires max;
        log_not_found off;
    }

    location = /admin-assets/site.css {
        alias /var/www/html/backend/web/css/site.css;
        expires 1h;
        log_not_found off;
    }

    location @backend {
        set $backend_app app;
        fastcgi_pass $backend_app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/web/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/backend/web;
    }

    location = /index.php {
        internal;
        set $upstream_app app;
        fastcgi_pass $upstream_app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/frontend/web/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/frontend/web;
    }

    location ~ \.php(?:/|$) {
        return 404;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|json)$ {
        try_files $uri /index.php?$query_string;
        expires max;
        log_not_found off;
    }
}
