server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    root /var/www/html/frontend/web;

    resolver 127.0.0.11 valid=30s;

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /login {
        try_files $uri @backend;
    }

    location = /logout {
        try_files $uri @backend;
    }

    location = /cp {
        try_files $uri @backend;
    }

    location ^~ /cp/ {
        try_files $uri @backend;
    }

    location ^~ /dist/ {
        root /var/www/html/backend/web;
        try_files $uri =404;
        expires max;
        log_not_found off;
    }

    location ^~ /plugins/ {
        root /var/www/html/backend/web;
        try_files $uri =404;
        expires max;
        log_not_found off;
    }

    location ^~ /swagger-ui/ {
        root /var/www/html/frontend/web;
        try_files $uri =404;
        expires max;
        log_not_found off;
    }

    location @backend {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/backend/web/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/backend/web;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        set $upstream_app app;
        fastcgi_pass $upstream_app:9000;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|json)$ {
        try_files $uri /index.php?$query_string;
        expires max;
        log_not_found off;
    }
}
